<style>

.step-lbl{font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}

.question{font-size:17px;font-weight:700;color:#1a202c;margin-bottom:5px;line-height:1.4}
.q-sub{font-size:12px;color:#718096;margin-bottom:14px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.opt{width:100%;text-align:left;padding:11px 14px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:10px;line-height:1.4;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:48px}
.opt:hover{border-color:#3182ce;background:#ebf8ff}
.opt-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.opt.sah{border-color:#fc8181;background:#fff5f5}

.opt.cog{border-color:#b794f4;background:#faf5ff}
.opt.cog:hover{border-color:#805ad5;background:#e9d8fd}

.opt.proceed{border-color:#3182ce;background:#ebf8ff}

.panel-btn{width:100%;text-align:left;padding:7px 12px;background:#f7fafc;border:1px solid #e2e8f0;border-radius:6px;margin:10px 0 4px;cursor:pointer;font-size:12px;color:#4a5568;display:flex;align-items:center;gap:6px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:44px}
.panel-btn:hover{background:#edf2f7}
.panel-body{display:none;background:#f7fafc;border:1px solid #e2e8f0;border-radius:6px;padding:14px;margin-bottom:12px;font-size:12px;line-height:1.6}
.panel-body.open{display:block}
.phone-script{background:#1a365d;color:#fff;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:12px;line-height:1.6}
.phone-script .label{font-size:10px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.phone-script .phrase{font-size:13px;font-weight:600}
.nrs-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.nrs-row{display:flex;align-items:stretch;gap:0;border-radius:6px;overflow:hidden;border:1px solid #e2e8f0}
.nrs-score{min-width:52px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.nrs-row.high .nrs-score{background:#fed7d7;color:#742a2a}
.nrs-row.mid .nrs-score{background:#fefcbf;color:#744210}
.nrs-row.low .nrs-score{background:#c6f6d5;color:#1c4532}

.nrs-row.mid .nrs-level{color:#744210}
.nrs-row.low .nrs-level{color:#276749}

.nv-tag{background:#e9d8fd;color:#44337a;border-radius:4px;padding:3px 8px;font-size:11px}

.result{border-radius:8px;padding:18px;border:2px solid}
.result.red{border-color:#e53e3e;background:#fff5f5}

.result.yellow{border-color:#b7791f;background:#fffff0}
.result.green{border-color:#276749;background:#f0fff4}

.result.gray{border-color:#718096;background:#f7fafc}

.result.red .rbadge{background:#e53e3e}
.result.orange .rbadge{background:#dd6b20}
.result.yellow .rbadge{background:#b7791f}
.result.green .rbadge{background:#276749}
.result.blue .rbadge{background:#2b6cb0}
.result.teal .rbadge{background:#2c7a7b}

.raction{font-size:13px;line-height:1.75;white-space:pre-line}
.rnote{margin-top:12px;padding:10px 13px;border-radius:6px;font-size:12px;line-height:1.6;white-space:pre-line;background:#f7fafc;border-left:4px solid #a0aec0}
.rnote.warn{background:#fffaf0;border-left-color:#ed8936;color:#7b341e}
.rnote.alert{background:#fff5f5;border-left-color:#e53e3e;color:#742a2a}
.rnote.cog{background:#faf5ff;border-left-color:#805ad5;color:#44337a}
.rnote.ok{background:#f0fff4;border-left-color:#48bb78;color:#1c4532}
.rnote.teal{background:#e6fffa;border-left-color:#38b2ac;color:#1d4044}
.divider{border:none;border-top:2px dashed #e2e8f0;margin:16px 0}
.capacity-header{font-size:11px;font-weight:700;color:#2c7a7b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.nav{display:flex;gap:8px;margin-top:16px}
.btn-back{padding:9px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#edf2f7;color:#4a5568;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:44px}

.btn-reset:hover{background:#2a4a7f}
.foot{background:#fff;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 12px 12px;padding:10px 18px;font-size:10px;color:#a0aec0;text-align:center;line-height:1.5}
</style>
</head>

let hist=[],cur="q1";
function togglePanel(id){
  const el=document.getElementById("pb_"+id),btn=document.getElementById("pbtn_"+id);
  if(!el)return;
  el.classList.toggle("open");
  if(btn)btn.innerHTML=(el.classList.contains("open")?"▲ 閉じる":"▼ 詳細を見る")+" &nbsp;"+P[id].title;
}
function goBack(){if(hist.length===0)return;cur=hist.pop();render()}
function reset(){hist=[];cur="q1";render()}
function nav(id){hist.push(cur);cur=id;render()}
function render(){
  const node=T[cur];
  const content=document.getElementById("content");
  const back=document.getElementById("btnBack");
  const crumb=document.getElementById("crumb");
  const pFill=document.getElementById("pFill");
  const pLabel=document.getElementById("pLabel");
  back.style.display=hist.length>0?"inline-block":"none";
  if(hist.length>0){
    crumb.innerHTML=hist.map(h=>{const n=T[h];return`<span class="crumb-item">${n?n.lbl:h}</span><span class="crumb-sep">›</span>`;}).join("")+
      `<span class="crumb-item" style="background:#bee3f8;color:#2b6cb0">${node?node.lbl||cur:cur}</span>`;
  }else{crumb.innerHTML="";}
  if(!node){content.innerHTML="<p>エラー</p>";return;}

  if(node.type==="result"){
    if(node.next){
      /* 中間結果：JTAS判定表示 + 受入可否確認ボタン */
      const pct=Math.round((6/8)*100);
      pFill.style.width=pct+"%";pLabel.textContent="JTAS判定完了 → 受入可否確認へ";
      let h=`<div class="result ${node.color}"><div class="rbadge">${node.badge}</div><div class="rlevel">${node.level}</div><div class="raction">${node.action}</div>`;
      if(node.note)h+=`<div class="rnote ${node.noteType||''}">${node.note}</div>`;
      h+=`</div>`;
      h+=`<hr class="divider">`;
      h+=`<div class="capacity-header">🏥 受入可否の最終確認</div>`;
      h+=`<div class="opts"><button class="opt proceed" onclick="nav('${node.next}')"><span class="opt-icon">▶</span><span>処置体制を確認して受入可否を決定する</span></button></div>`;
      content.innerHTML=h;
    } else {
      /* 最終結果（終端） */
      pFill.style.width="100%";pLabel.textContent="判定完了";
      let h=`<div class="result ${node.color}"><div class="rbadge">${node.badge}</div><div class="rlevel">${node.level}</div><div class="raction">${node.action}</div>`;
      if(node.note)h+=`<div class="rnote ${node.noteType||''}">${node.note}</div>`;
      h+=`</div>`;content.innerHTML=h;
    }
  } else {
    /* 質問ノード */
    const pct=Math.round(((node.step-1)/node.max)*100);
    pFill.style.width=pct+"%";
    pLabel.textContent=node.isFinal?`最終確認ステップ ${node.step} / ${node.max}`:`ステップ ${node.step} / ${node.max}`;
    let lblClass=node.isFinal?"step-lbl final":"step-lbl";
    let h=`<div class="${lblClass}">${node.lbl}</div><div class="question">${node.q}</div>`;
    if(node.sub)h+=`<div class="q-sub">${node.sub}</div>`;
    if(node.panel){
      const pd=P[node.panel];
      h+=`<button class="panel-btn" id="pbtn_${node.panel}" onclick="togglePanel('${node.panel}')">▼ 詳細を見る &nbsp;${pd.title}</button>
      <div class="panel-body" id="pb_${node.panel}">${pd.html}</div>`;
    }
    h+=`<div class="opts">`;
    for(const o of node.opts){
      let cls="opt";
      if(o.sah)cls+=" sah";if(o.cog)cls+=" cog";if(o.dnar)cls+=" dnar-yes";
      if(o.cpa_no)cls+=" cpa-no";if(o.kakari)cls+=" kakari";
      if(o.accept)cls+=" accept";if(o.decline)cls+=" decline";
      h+=`<button class="${cls}" onclick="nav('${o.next}')">`;
      if(o.icon)h+=`<span class="opt-icon">${o.icon}</span>`;
      h+=`<span>${o.label}</span></button>`;
    }
    h+=`</div>`;content.innerHTML=h;
  }
}
render();
</script>
</body>
</html>
